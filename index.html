<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kell</title>
    <link rel="stylesheet" href="clock.css">
    <script src="clock.js" defer></script>
</head>
<body>

    <h1>Aksel Aisting</h1>

<div id="container">

    <div id="clockContainer">
        <span id="hours">00</span> :
        <span id="minutes">00</span> :
        <span id="seconds">00</span>
    </div>

    <div id="dateContainer">
        <span id="weekday">Esmaspäev</span>
        <span id="day">01.</span>
        <span id="month">01.</span>
        <span id="year">2000</span>
    </div>

    <div id="buttonContainer">
        <button id="bigger">+</button>
        <button id="smaller">-</button>
    </div>

    <div id="colorControls">
        <input type="color" id="lColorInput" value="#ffffff">
        <input type="range" id="laInput" min="0" max="1" step="0.1" value="1">

        <input type="color" id="textColorInput" value="#ffffff">
        <input type="range" id="textAlpha" min="0" max="1" step="0.1" value="1">

        <input type="color" id="bgColorInput" value="#5f4b4b">
        <input type="range" id="bgAlpha" min="0" max="1" step="0.1" value="1">

        <button id="applyColor">Apply</button>
    </div>

    


</div>

</body>
</html>
